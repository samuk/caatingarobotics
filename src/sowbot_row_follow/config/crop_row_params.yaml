# crop_row_params.yaml
# ====================
# Hardware-specific parameters for crop_row_node on Sowbot.
#
# Location in repo: caatinga_vision/config/crop_row_params.yaml
#
# Two values MUST be measured from the physical robot before field use:
#   camera_height_m  — tape measure from camera lens to soil surface (m)
#   camera_tilt_deg  — angle of camera from horizontal (downward = negative)
#
# These feed directly into the Cherubini & Chaumette interaction matrix
# (deltaz and tilt_angle). Getting them wrong will produce a systematic
# angular bias — the robot will still follow rows but not accurately.
#
# Tune detection params by watching /row_nav/debug_image in Foxglove.

crop_row_node:
  ros__parameters:

    # -------------------------------------------------------------------------
    # Camera hardware — MEASURE THESE ON YOUR ROBOT before field use
    # -------------------------------------------------------------------------
    image_topic: "/devkit/camera/image_raw"  # USB camera published by usb_cam_node_exe
    camera_index: 0            # Check available devices: v4l2-ctl --list-devices
    image_width: 640
    image_height: 480

    # BonnBot defaults shown. Replace with Sowbot measurements.
    camera_height_m: 1.2       # TODO: tape measure from lens to soil surface (m)
    camera_tilt_deg: -80.0     # TODO: tilt from horizontal, downward = negative (deg)

    # -------------------------------------------------------------------------
    # Detection tuning — adjust while watching /row_nav/debug_image in Foxglove
    # -------------------------------------------------------------------------
    n_scan_windows: 8          # Vertical scan columns. More = finer but slower.
    window_width: 80           # Column width (px). Should span one full crop row.
    min_contour_area: 10.0     # Min contour area (px²). Increase to filter soil noise.

    # -------------------------------------------------------------------------
    # Velocity — start conservative, increase only once row-following is stable
    # -------------------------------------------------------------------------
    linear_vel: 0.15           # Forward speed (m/s). BonnBot used 0.2.
    omega_scaler: 0.1          # Scale on raw controller output. Upstream default.
    max_omega: 0.4             # Hard angular velocity cap (rad/s).

    # -------------------------------------------------------------------------
    # Output mode — ignored at runtime; /row_follow/enable service is the gate.
    # Kept here so ROS does not warn about an undeclared parameter on startup.
    # -------------------------------------------------------------------------
    use_direct_cmd_vel: true   # value ignored; declare only

    # -------------------------------------------------------------------------
    # M10: heartbeat timeout for Limbic System PERCEPTION_DEGRADED trigger
    # -------------------------------------------------------------------------
    heartbeat_timeout_s: 2.0

    # -------------------------------------------------------------------------
    # Detector backend — selected at launch, NOT here.
    #   manage.py neo       -> detector=scanwin (default, this file's tuning)
    #   manage.py neo-tsm   -> detector=tsm (Triangle Scan Method)
    # Declared here only so ROS does not warn about undeclared params. The
    # launch file overrides 'detector'. TSM tunables (512x512 frame defaults):
    # -------------------------------------------------------------------------
    detector: "scanwin"        # overridden by launch; do not rely on this value
    tsm_s: 0.2                 # anchor ROI height fraction (h = s*H)
    tsm_amin_frac: 0.2         # anchor column search start (fraction of width)
    tsm_amax_frac: 0.7         # anchor column search end (fraction of width)
    tsm_b_frac: 0.0            # line-scan Begin point x (fraction of width)
    tsm_c_frac: 1.0            # line-scan Cease point x (fraction of width)
    tsm_anchor_min_sum: 1.0    # min anchor column-sum to accept (else strip-shift)
    tsm_morph_kernel: 5        # mask opening kernel px (denoise ExG); 0 = off
    tsm_filter_enable: true    # temporal EMA + outlier-gate + bounded-hold
    tsm_filter_alpha: 0.4      # EMA weight on new frame; lower = smoother
    tsm_filter_jump_gate_frac: 0.35  # reject frame if jump > frac*width
    tsm_filter_max_hold: 2     # hold last across N misses, then invalid (heartbeat dies)
