# crop_row_params.yaml
# ====================
# Hardware-specific parameters for crop_row_node and limbic_row_follow_node
# on Sowbot.
#
# Location in repo: sowbot_row_follow/config/crop_row_params.yaml
#
# Two values MUST be measured from the physical robot before field use:
#   camera_height_m  — tape measure from camera lens to soil surface (m)
#   camera_tilt_deg  — angle of camera from horizontal (downward = negative)
#
# These feed directly into the Cherubini & Chaumette interaction matrix
# (deltaz and tilt_angle). Getting them wrong will produce a systematic
# angular bias — the robot will still follow rows but not accurately.
#
# Tune detection params by watching /caatinga_vision/row_nav/debug_image
# in Foxglove.

crop_row_node:
  ros__parameters:

    # -------------------------------------------------------------------------
    # Camera hardware — MEASURE THESE ON YOUR ROBOT before field use
    # -------------------------------------------------------------------------
    image_topic: "/devkit/camera/image_raw"  # USB camera published by usb_cam_node_exe
    debug_image_topic: "/caatinga_vision/row_nav/debug_image"  # annotated frame (Foxglove)
    image_width: 640
    image_height: 480

    camera_height_m: 1.055     # from ifarmate.urdf.xacro cam_mount_z
    camera_tilt_deg: -20.0     # from ifarmate.urdf.xacro sensor pitch (0.35 rad)

    # -------------------------------------------------------------------------
    # Steering trim — compensates a CONSTANT lateral/yaw bias
    # -------------------------------------------------------------------------
    steering_trim_deg: 0.0

    # -------------------------------------------------------------------------
    # Detection tuning — adjust while watching debug_image_topic in Foxglove
    # -------------------------------------------------------------------------
    n_scan_windows: 8
    window_width: 80
    min_contour_area: 40.0
    plant_close_kernel: 21

    # NEW — Otsu (cv.THRESH_OTSU in compute_exg_mask) is a global,
    # per-frame-adaptive threshold: it has no notion of what "real
    # vegetation" looks like in absolute ExG terms, only what best splits
    # THIS frame's histogram. On a low-vegetation frame (end-of-row: mostly
    # bare soil) there's not enough real green mass to anchor a sensible
    # split, so Otsu can pick a low threshold and sweep background noise —
    # soil colour variation, shadow, render artefacts — into the
    # "vegetation" class. Symptom: the TSM row line correctly drops at
    # row-end, then reappears locked onto a background artefact once
    # nothing else competes for the (degenerate) threshold.
    #
    # 15.0 here is an UNVALIDATED PLACEHOLDER, not a calibrated value —
    # same situation tsm_line_min_sum was in before real numbers existed.
    # crop_row_node now logs "ExG otsu_threshold=..." (throttled, INFO)
    # every frame. Drive over a real row vs. a real row-end/artefact frame,
    # read the actual otsu_threshold numbers off the console for each, and
    # set exg_min_threshold from that — not from this guess.
    # 25.0 — STARTING POINT, NOT A VERIFIED VALUE. Confirmed behaviour:
    # the purple bar only appears on empty (no-crop-in-frame) frames, and
    # is absent when a real row is in frame. That matches Otsu having
    # nothing to anchor to on an empty frame and drifting to a low
    # threshold that admits soil noise; with a real row present there's
    # enough green mass to pick a much higher, correct threshold.
    #
    # 25 is set above the ~21 an empty/artifact frame produced in a
    # synthetic repro of this failure mode — NOT your actual sim numbers.
    # Watch the "ExG otsu_threshold=..." log (throttled, INFO):
    #   - on an empty frame: should now read exactly 25.0 (floored) and
    #     the purple bar should be gone from debug_image.
    #   - on a real-row frame: should read well above 25 on its own,
    #     unaffected by the floor — if it's reading close to 25, raise
    #     this value, it means real rows aren't leaving much margin.
    # Adjust from those two real numbers, not from this comment.
    exg_min_threshold: 25.0

    # Root cause not pinned down (seen both in empty frames and with a real
    # row in frame) — pragmatic call: just exclude it rather than keep
    # chasing the classifier. Blanks the bottom N px of the mask before
    # both plant-center display AND TSM detection. Raise if 20px doesn't
    # fully clear it in your debug_image.
    mask_bottom_crop_px: 20

    plant_detect_neighborhood_px: 18
    plant_detect_min_dist_px: 6.0

    # -------------------------------------------------------------------------
    # Velocity
    # -------------------------------------------------------------------------
    linear_vel: 0.15
    omega_scaler: 0.1
    max_omega: 0.4

    use_direct_cmd_vel: true

    heartbeat_timeout_s: 4.0

    detector: "scanwin"        # overridden by launch; do not rely on this value
    tsm_s: 0.32                # anchor ROI height fraction (h = s*H) — unchanged

    tsm_amin_frac: 0.4
    tsm_amax_frac: 0.6

    tsm_b_frac: 0.0
    tsm_c_frac: 1.0

    # CHANGED 8.0 -> 36.0. h = 0.32*480 = 154px, so old value accepted a
    # column as "row" at <5% coverage — noise/shadow/single-weed level. 36
    # is ~23% coverage: still tolerant of a thin/young row, but well above
    # what end-of-row bare soil scores. This is the primary loss-sensitivity
    # knob. Raise further if it's still holding past the visible row end;
    # lower if it starts dropping lock on real rows mid-run.
    tsm_anchor_min_sum: 36.0

    # Was 80.0 — too high: line_scan sums one pixel per row along the full
    # line, but real per-plant rows have gaps of bare soil between plants,
    # so even an obvious row can legitimately score well under that. 80.0
    # was rejecting real detections, not just row-ends.
    # crop_row_node.py now logs the actual line_sum (throttled, INFO level)
    # so you can read real numbers off the console while driving a known
    # row vs. a known row-end, and set this from that instead of a guess.
    # 10.0 here is a conservative floor — only meant to unblock following
    # while you gather those numbers, not a calibrated value.
    tsm_line_min_sum: 10.0

    tsm_morph_kernel: 5

    tsm_single_row_offset_px: 0

    tsm_n_rows: 1

    tsm_filter_enable: true
    tsm_filter_alpha: 0.4
    tsm_filter_jump_gate_frac: 0.35
    # REVERTED 1 -> 2. Was tightened alongside tsm_max_strip_shifts as a
    # second belt-and-braces cut against the "never drops" bug. With that
    # bug now fixed properly (tsm_line_min_sum) there's no need to also
    # shave the filter's hold grace — do it here and it just adds
    # sensitivity to normal single-frame dropouts (motion blur, a stone,
    # a shadow) that aren't real row-ends.
    tsm_filter_max_hold: 2

    tsm_anchor_select: "spatial_prior"
    tsm_peak_rel_thresh: 0.6
    # CHANGED 0.05 -> 0.02. spatial_prior picks the column that maximises
    # (col_sum - prior_lambda*|distance from previous anchor|). At 0.05 it
    # will happily pick a weak column next to the old anchor over a
    # stronger column elsewhere — i.e. it can keep "confirming" leftover
    # noise near where it was already locked instead of admitting the row
    # moved or ended. Lower value lets raw column strength dominate.
    tsm_prior_lambda: 0.02
    tsm_prior_init_frac: 0.5
    tsm_weight_k: 0.5
    tsm_weight_side: "left"

    tsm_max_angle_deg: 30.0

    tsm_fit_mode: "tsm"        # do NOT switch to "ransac" for this problem —
                                # see note below, it doesn't gate validity.
    tsm_ransac_iters: 60
    tsm_ransac_corridor_px: 6.0
    tsm_ransac_min_inliers: 30
    tsm_ransac_max_points: 2000

    # REVERTED 0 -> 2. At 0, anchor_scan only ever checks the top strip
    # (rows [0, 0.32*H) — far field, near the horizon at this pitch) and
    # never shifts down, so it never looks at the near field/directly in
    # front of the robot. Result: an obvious row right under the camera
    # gets reported invalid because anchor_scan structurally never scans
    # that part of the frame. That's a search-range bug, not a
    # loss-detection feature.
    #
    # Row-end loss detection is already handled correctly elsewhere:
    # tsm_line_min_sum (above) stops line_scan from returning a
    # zero-support phantom "valid" line, and row_discovery_node's
    # row_lost_confirm_s (1.5s) debounces that invalid signal before
    # calling it a real row-end. Restricting the spatial search area was
    # redundant on top of that and is what broke near-field detection.
    # Leave at 2 (searches down to ~96% of frame height) and let
    # line_min_sum + row_lost_confirm_s do the loss-detection job.
    tsm_max_strip_shifts: 2

    tsm_swap_hold_s: 9.0             # unchanged — only affects row-SWITCH
    tsm_swap_threshold_frac: 0.30    # debounce, not loss detection; raw
                                      # invalid bypasses this entirely.


limbic_row_follow:
  ros__parameters:
    row_follow_handover_distance: 2.5
    heartbeat_timeout_s: 6.0
    enable_service_timeout_s: 4.0
    monitor_rate_hz: 10.0

    row_entry_align_tolerance_deg: 8.0
    row_entry_align_timeout_s: 15.0
    row_entry_align_angular_speed: 0.3
