# crop_row_params.yaml
# ====================
# Hardware-specific parameters for crop_row_node on Sowbot.
#
# Location in repo: caatinga_vision/config/crop_row_params.yaml
#
# Two values MUST be measured from the physical robot before field use:
#   camera_height_m  — tape measure from camera lens to soil surface (m)
#   camera_tilt_deg  — angle of camera from horizontal (downward = negative)
#
# These feed directly into the Cherubini & Chaumette interaction matrix
# (deltaz and tilt_angle). Getting them wrong will produce a systematic
# angular bias — the robot will still follow rows but not accurately.
#
# Tune detection params by watching /row_nav/debug_image in Foxglove.
#
# THIS FILE is tuned for the TSM (neo-tsm) "prefer the LEFT of two visible
# rows" case seen in the field clips: two sparse columns of point-like
# seedlings, both near centre-right of frame, where the baseline argmax
# detector swings between them. scanwin (manage.py neo) is unaffected — its
# tuning is the n_scan_windows/window_width/min_contour_area block below.

crop_row_node:
  ros__parameters:

    # -------------------------------------------------------------------------
    # Camera hardware — MEASURE THESE ON YOUR ROBOT before field use
    # -------------------------------------------------------------------------
    image_topic: "/devkit/camera/image_raw"  # USB camera published by usb_cam_node_exe
    camera_index: 0            # Check available devices: v4l2-ctl --list-devices
    image_width: 640
    image_height: 480

    # BonnBot defaults shown. Replace with Sowbot measurements.
    camera_height_m: 1.2       # TODO: tape measure from lens to soil surface (m)
    camera_tilt_deg: -80.0     # TODO: tilt from horizontal, downward = negative (deg)

    # -------------------------------------------------------------------------
    # scanwin detection tuning (manage.py neo) — unchanged from baseline.
    # Watch /row_nav/debug_image in Foxglove.
    # -------------------------------------------------------------------------
    n_scan_windows: 8          # Vertical scan columns. More = finer but slower.
    window_width: 80           # Column width (px). Should span one full crop row.
    min_contour_area: 10.0     # Min contour area (px²). Increase to filter soil noise.

    # -------------------------------------------------------------------------
    # Velocity — start conservative, increase only once row-following is stable
    # -------------------------------------------------------------------------
    linear_vel: 0.15           # Forward speed (m/s). BonnBot used 0.2.
    omega_scaler: 0.1          # Scale on raw controller output. Upstream default.
    max_omega: 0.4             # Hard angular velocity cap (rad/s).

    # -------------------------------------------------------------------------
    # Output mode — ignored at runtime; /row_follow/enable service is the gate.
    # Kept here so ROS does not warn about an undeclared parameter on startup.
    # -------------------------------------------------------------------------
    use_direct_cmd_vel: true   # value ignored; declare only

    # -------------------------------------------------------------------------
    # M10: heartbeat timeout for Limbic System PERCEPTION_DEGRADED trigger
    # -------------------------------------------------------------------------
    heartbeat_timeout_s: 2.0

    # -------------------------------------------------------------------------
    # Detector backend — selected at launch, NOT here.
    #   manage.py neo       -> detector=scanwin (default; scanwin block above)
    #   manage.py neo-tsm   -> detector=tsm (Triangle Scan Method, below)
    # The launch file overrides 'detector'; the value here is a placeholder so
    # ROS does not warn about an undeclared parameter.
    # -------------------------------------------------------------------------
    detector: "scanwin"        # overridden by launch; do not rely on this value

    # -- TSM geometry ---------------------------------------------------------
    # All *_frac values are fractions of frame width/height, so they are
    # resolution-independent (the algorithm's internal 512x512 defaults do not
    # need changing for a 640x480 feed).
    tsm_s: 0.30                # anchor ROI height fraction. RAISED from 0.2:
                               #   sparse point-like seedlings need a taller
                               #   strip to integrate enough plants for a stable
                               #   column-sum peak.
    tsm_amin_frac: 0.20        # anchor search start (frac width)
    tsm_amax_frac: 0.85        # anchor search end (frac width). WIDENED from
                               #   0.7 so BOTH visible columns fall inside the
                               #   search range — leftmost_peak then chooses the
                               #   left one. (For a HARD restriction to the left
                               #   row, narrow this instead, e.g. 0.55, and the
                               #   right row is excluded outright — no mode needed.)
    tsm_b_frac: 0.10           # line-scan Begin x (frac width)
    tsm_c_frac: 0.90           # line-scan Cease x (frac width). Inset from
                               #   0.0/1.0 to stop the fitted line tilting to the
                               #   frame edges on a sparse signal.
    tsm_anchor_min_sum: 1.0    # min anchor column-sum to accept (else strip-shift)

    # -- TSM mask denoising ---------------------------------------------------
    tsm_morph_kernel: 3        # opening kernel (px). LOWERED from 5: at this
                               #   seedling sparsity a 5px open erases small
                               #   plants. 3 removes speckle without starving the
                               #   scan. Set 0 to disable entirely.
                               # NOTE: this is a SYMMETRIC open. A vertical
                               #   (anisotropic) dilation to bridge a row's dots
                               #   into a continuous ridge is NOT yet implemented
                               #   and is the likely next improvement for sparse
                               #   rows — flagged, not built.

    # -- TSM temporal filter (EMA + outlier-gate + bounded-hold) --------------
    tsm_filter_enable: true
    tsm_filter_alpha: 0.35     # EMA weight on new frame; LOWERED slightly from
                               #   0.4 for a steadier line on a jittery signal.
    tsm_filter_jump_gate_frac: 0.30  # reject a frame whose anchor/base jumps
                               #   more than 30% of width — catches single-frame
                               #   flips to the other row.
    tsm_filter_max_hold: 2     # hold last estimate across N misses, then report
                               #   invalid so the heartbeat dies (safety path).

    # -- TSM multi-row disambiguation — PREFER THE LEFT ROW -------------------
    #   argmax | leftmost_peak | rightmost_peak | spatial_prior | weighted
    # leftmost_peak chosen as the primary fix: fewest knobs, behaviour obvious
    # from one frame (line should snap to the LEFT column). If it proves jittery
    # frame-to-frame, switch to spatial_prior (sticky tracking): set
    # anchor_select: "spatial_prior" and rely on prior_lambda / prior_init_frac.
    tsm_anchor_select: "leftmost_peak"
    tsm_peak_rel_thresh: 0.50  # accept the left peak if it is >= 50% of the
                               #   strongest peak. FORGIVING (lower than 0.6)
                               #   because the left row is often the sparser of
                               #   the two — do not require it to match the right.
    # spatial_prior fallback params (unused while anchor_select=leftmost_peak):
    tsm_prior_lambda: 0.02     # distance penalty (px^-1); firmer than 0.01 to
                               #   hold the row once locked.
    tsm_prior_init_frac: 0.35  # first-frame seed left-of-centre to grab the left
                               #   column. ADJUST to the left row's actual x once
                               #   measured from a binary mask.
    # weighted-mode params (unused while anchor_select=leftmost_peak):
    tsm_weight_k: 0.5          # soft-bias strength
    tsm_weight_side: "left"    # preferred side
