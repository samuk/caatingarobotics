# crop_row_params.yaml
# ====================
# Hardware-specific parameters for crop_row_node and limbic_row_follow_node
# on Sowbot.
#
# Location in repo: sowbot_row_follow/config/crop_row_params.yaml
#
# Two values MUST be measured from the physical robot before field use:
#   camera_height_m  — tape measure from camera lens to soil surface (m)
#   camera_tilt_deg  — angle of camera from horizontal (downward = negative)
#
# These feed directly into the Cherubini & Chaumette interaction matrix
# (deltaz and tilt_angle). Getting them wrong will produce a systematic
# angular bias — the robot will still follow rows but not accurately.
#
# Tune detection params by watching /caatinga_vision/row_nav/debug_image
# in Foxglove.

crop_row_node:
  ros__parameters:

    # -------------------------------------------------------------------------
    # Camera hardware — MEASURE THESE ON YOUR ROBOT before field use
    # -------------------------------------------------------------------------
    image_topic: "/devkit/camera/image_raw"  # USB camera published by usb_cam_node_exe
    debug_image_topic: "/caatinga_vision/row_nav/debug_image"  # annotated frame (Foxglove)
    image_width: 640
    image_height: 480

    # Derived from ifarmate.urdf.xacro (camera_joint + Gazebo <sensor> pose),
    # not measured by hand — these are exact given the xacro's own values:
    #   cam_mount_z = (cam_zone_bottom + cam_zone_top) / 2
    #               = (0.86 + 1.25) / 2 = 1.055 m above ground
    #   <pose>0 0 0 0 0.35 0</pose> -> pitch 0.35 rad = 20.0 deg downward
    #     (xacro's own comment: "Pitched down 20°"; node convention is
    #     downward = negative, per the docstring above)
    # Replaces unconfirmed BonnBot placeholders (1.2 m, -80 deg) that were
    # never updated for Sowbot/ifarmate — -80 deg is nearly straight down,
    # wildly different from the camera's actual shallow 20 deg tilt, and
    # was very likely corrupting the visual-servo steering output even
    # while TSM detection itself looked reasonable in debug_image.
    camera_height_m: 0.80     # from ifarmate.urdf.xacro cam_mount_z
    camera_tilt_deg: -35.0     # from ifarmate.urdf.xacro sensor pitch (0.35 rad) the more negative the number, the more downward the tilt, and the less horizon in frame.

    # -------------------------------------------------------------------------
    # Detection tuning — adjust while watching debug_image_topic in Foxglove
    # -------------------------------------------------------------------------
    n_scan_windows: 8          # Vertical scan columns. More = finer but slower.
    window_width: 80           # Column width (px). Should span one full crop row.
    # Raised from 10.0: filters soil speckle and small weed fragments from the
    # debug overlay. Does not affect TSM (which uses the binary mask directly),
    # but gives a cleaner plant-centre visualisation for tuning.
    min_contour_area: 40.0     # Min contour area (px²). Increase to filter soil noise.

    # Morphological CLOSE kernel (px) applied after ExG+Otsu thresholding,
    # to reconnect fragments of the SAME plant (leaf-vein shadow, canopy
    # texture). Used by compute_exg_mask for the TSM mask input; does NOT
    # directly control per-plant dot placement (that is now handled by the
    # distance-transform local-maxima approach in get_plant_centers).
    plant_close_kernel: 21

    # Distance-transform plant centre detection (get_plant_centers).
    # Replaces the previous contour-centroid approach, which collapsed an
    # entire dense lettuce row into one blob and returned only ~1-3 dots for
    # a full bed of 8+ plants.
    #
    # plant_detect_neighborhood_px — non-max suppression radius (px).
    #   Two peaks must be at least this far apart.  Set to ~half the expected
    #   centre-to-centre pixel distance between adjacent plants.
    #   At 640x480 with camera ~1.2 m over soil, 30 px ~ 6 cm, which is
    #   well below typical in-row lettuce spacing (~20 cm → ~100 px).
    #   Reduce if two nearby plants produce one merged dot; increase if one
    #   large plant produces multiple dots.
    plant_detect_neighborhood_px: 30

    # plant_detect_min_dist_px — minimum distance-transform value to count
    #   as a valid peak.  Rejects single-pixel noise and edge artefacts whose
    #   distance value is very small.  ~half the dilation kernel radius (5 for
    #   a 10 px kernel) leaves real plant interiors well above the threshold.
    plant_detect_min_dist_px: 10.0

    # -------------------------------------------------------------------------
    # Velocity — start conservative, increase only once row-following is stable
    # -------------------------------------------------------------------------
    linear_vel: 0.15           # Forward speed (m/s). BonnBot used 0.2.
    omega_scaler: 0.1          # Scale on raw controller output. Upstream default.
    max_omega: 0.4             # Hard angular velocity cap (rad/s).

    # -------------------------------------------------------------------------
    # Output mode — ignored at runtime; /row_follow/enable service is the gate.
    # Kept here so ROS does not warn about an undeclared parameter on startup.
    # -------------------------------------------------------------------------
    use_direct_cmd_vel: true   # value ignored; declare only

    # -------------------------------------------------------------------------
    # M10: heartbeat timeout for Limbic System PERCEPTION_DEGRADED trigger
    # -------------------------------------------------------------------------
    heartbeat_timeout_s: 4.0

    # -------------------------------------------------------------------------
    # Detector backend — selected at launch, NOT here.
    #   manage.py neo       -> detector=scanwin (default, this file's tuning)
    #   manage.py neo-tsm   -> detector=tsm (Triangle Scan Method)
    # Declared here only so ROS does not warn about undeclared params. The
    # launch file overrides 'detector'. TSM tunables (640x480 frame values):
    # -------------------------------------------------------------------------
    detector: "scanwin"        # overridden by launch; do not rely on this value
    # Raised from 0.2: the original strip sat almost entirely in the
    # perspective-compressed band near the horizon, where adjacent rows are
    # closest together and hardest to disambiguate by column-sum. Extending
    # the strip further down the frame includes the part of the row where
    # separation from its neighbours is actually wide enough to trust.
    tsm_s: 0.32                # anchor ROI height fraction (h = s*H)

    # Search range for the anchor scan, shared across all band slots.
    # Narrowed to a band centred on the image (was 0.1-0.85, which let the
    # anchor lock onto a neighbouring row off to the side). For single-row
    # "follow what's directly ahead" behaviour the anchor MUST be restricted
    # to a corridor around the robot's centreline — widen only if the centre
    # crop row sometimes falls outside this range in debug_image (e.g. on
    # sharp re-acquire after a turn).
    tsm_amin_frac: 0.4         # anchor column search start (fraction of width)
    tsm_amax_frac: 0.6         # anchor column search end (fraction of width)

    tsm_b_frac: 0.0            # line-scan Begin point x (fraction of width)
    tsm_c_frac: 1.0            # line-scan Cease point x (fraction of width)

    # Minimum lit-pixel column-sum in the anchor ROI strip to accept an anchor.
    # If no column clears this threshold the strip shifts down (end-of-row
    # handling) rather than locking onto noise. At 640x480 with tsm_s=0.2 the
    # strip is 96px tall; a real crop column carries ~20–40 lit px over that
    # height after the morph opening, so 8.0 rejects single-pixel artefacts
    # and thin weed fragments while passing even sparse germination.
    # Raised from 1.0 which allowed end-of-bed speckle to anchor and caused
    # the green-line crossing seen in field run frames 20–22.
    tsm_anchor_min_sum: 8.0

    tsm_morph_kernel: 5        # mask opening kernel px (denoise ExG); 0 = off

    # Single-row offset seed — used by the adaptive (Option C) heading correction.
    # When only a subset of tsm_n_rows bands fire, avg_row is shifted toward
    # the missing band by _last_row_spacing_px / 2 pixels.  _last_row_spacing_px
    # is updated every frame where all bands are valid and is seeded to
    # 2 × tsm_single_row_offset_px at startup.
    # Set this to approximately half the expected inter-row pixel separation so
    # the first single-row frame gets a reasonable offset before any two-row
    # frame is seen. From field run: rows ~190px apart → half = 95.
    tsm_single_row_offset_px: 0

    # Multi-row detection — how many horizontal bands to scan simultaneously.
    # 1 (default): single-row path with swap-hold debounce (see below).
    # >1: detect_rows_multi partitions [amin_frac, amax_frac] into N equal bands
    #     and averages their headings; swap-hold is bypassed (band partitioning
    #     prevents inter-row flipping). Widen amin_frac/amax_frac to 0.1/0.85+
    #     when using tsm_n_rows > 1 so all rows fall within the search range.
    tsm_n_rows: 1

    # Temporal filter — EMA + outlier-gate + bounded-hold over successive frames.
    tsm_filter_enable: true    # temporal EMA + outlier-gate + bounded-hold
    tsm_filter_alpha: 0.4      # EMA weight on new frame; lower = smoother
    tsm_filter_jump_gate_frac: 0.35  # reject frame if jump > frac*width
    tsm_filter_max_hold: 2     # hold last across N misses, then invalid (heartbeat dies)

    # Anchor selection mode — applies within each band when tsm_n_rows > 1.
    # With a 240px band and good germination density there is usually only one
    # peak per band, so the mode rarely changes the result. Kept at
    # leftmost_peak as a tie-breaker for the left band when two sub-peaks exist.
    #   argmax (default) | leftmost_peak | rightmost_peak | spatial_prior | weighted
    # For a hard restriction, narrow tsm_amin_frac/tsm_amax_frac instead.
    # spatial_prior: biases the anchor toward a reference column instead of
    # just the densest one. Seeded at 0.5 (image centre = directly ahead) and
    # then sticky frame-to-frame via prev_anchor, so a denser neighbouring
    # row can't poach the anchor the way plain argmax did. This is the mode
    # that actually encodes "follow what's in front of me" — argmax only
    # encodes "follow whichever row has the most pixels right now".
    tsm_anchor_select: "spatial_prior"
    tsm_peak_rel_thresh: 0.6   # leftmost/rightmost_peak: peak >= frac of global max
    # Raised from 0.01: needs to be strong enough to outweigh a neighbouring
    # row's mass advantage at typical inter-row pixel spacing. If it still
    # jumps rows in debug_image, raise further (0.05+); if it feels too
    # sticky to correct heading drift, lower it.
    tsm_prior_lambda: 0.05     # spatial_prior: distance penalty (px^-1)
    tsm_prior_init_frac: 0.5   # spatial_prior: first-frame seed — image centre
    tsm_weight_k: 0.5          # weighted: bias strength
    tsm_weight_side: "left"    # weighted: preferred side

    # Near-vertical angle clamp. Restricts the line-scan bottom point to a cone
    # around the apex so the fit cannot exceed this angle off image-vertical.
    # Set 0.0 to disable (allow any angle). The code default is 15.0, so this
    # line MUST be present and set to 0.0 to keep the clamp off — deleting it
    # would silently re-enable a 15° clamp at next launch.
    # Evidence from debug_image (frames showing the cone boundary): the
    # fitted line was pinned right against the 15deg edge, not floating
    # freely inside it — meaning the true row angle exceeds 15deg off
    # vertical whenever the robot's heading isn't perfectly parallel to the
    # bed, and the clamp was clipping the fit short of the real row line
    # rather than rejecting noise. Raised to 30deg to give the line scan
    # room to follow the actual row geometry during normal heading
    # correction. If this reintroduces the earlier "made it worse" failure
    # mode (line snapping to a diagonal through unrelated weed clutter),
    # the fix is tightening the anchor band further or raising
    # tsm_anchor_min_sum, not re-clamping the angle.
    tsm_max_angle_deg: 30.0

    # -------------------------------------------------------------------------
    # TSM row-swap hold — bridge germination gaps on the preferred (left) row.
    # NOTE: only active on the single-row path (tsm_n_rows == 1).
    # With tsm_n_rows=2 these params are declared but unused at runtime.
    # -------------------------------------------------------------------------
    # When the TSM anchor column jumps by more than tsm_swap_threshold_frac *
    # image_width in a single frame, the node treats it as a potential row
    # switch and starts a hold timer. For the duration of tsm_swap_hold_s the
    # node keeps publishing the last accepted (left) row angle unchanged.
    # If the left row reappears within that window the timer resets silently.
    # If it does not, the new row is accepted once the timer expires.
    #
    # At linear_vel=0.15 m/s, 9 s ≈ 1.35 m of forward travel before switching.
    # Reduce tsm_swap_hold_s if the robot overcommits to a bad angle in dense
    # weeds; increase if germination gaps are longer than ~1.35 m.
    # Note: node code default is 6.0 s — this file intentionally overrides
    # that to 9.0 s based on field experience.
    #
    # tsm_swap_threshold_frac: fraction of image width (640px → 96px at 0.15).
    #   Should be larger than EMA drift on the same row (~10–20px) but smaller
    #   than the inter-row distance in pixels. Tune by watching debug_image:
    #   a false hold shows an amber line without an actual row switch.
    # Raised from 0.15: that threshold was sized for the original wide
    # (0.1-0.85) anchor band. The band is now 0.4-0.6 (128px on a 640px
    # frame), so 0.15*width (96px) is ~75% of the entire band — ordinary
    # jitter between two close peaks can cross it on its own, which is what
    # was re-triggering HOLD almost continuously. Scaled up so only a swing
    # close to the band's full width counts as a genuine row swap.
    tsm_swap_hold_s: 9.0           # seconds to hold before accepting a row switch
    tsm_swap_threshold_frac: 0.30  # anchor shift > frac*width triggers hold


# -------------------------------------------------------------------------
# Limbic System row-follow orchestrator
# -------------------------------------------------------------------------
limbic_row_follow:
  ros__parameters:

    # Distance at which Phase 1 (visual servo) hands over to Phase 2 (nav2).
    row_follow_handover_distance: 2.5  # metres

    # Time without a True heartbeat on /aoc/heartbeat/neo_vision before
    # Phase 1 is aborted and Neo is disabled. Should be longer than
    # crop_row_node's heartbeat_timeout_s to give Neo time to report loss.
    heartbeat_timeout_s: 6.0

    # Timeout for the /row_follow/enable service call. If Neo does not
    # acknowledge enable or disable within this window, the action aborts.
    enable_service_timeout_s: 4.0

    # Rate at which the Phase 1 monitor loop checks distance and heartbeat.
    monitor_rate_hz: 10.0
