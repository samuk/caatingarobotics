# crop_row_params.yaml
# ====================
# Hardware-specific parameters for crop_row_node and limbic_row_follow_node
# on Sowbot.
#
# Location in repo: sowbot_row_follow/config/crop_row_params.yaml
#
# Two values MUST be measured from the physical robot before field use:
#   camera_height_m  — tape measure from camera lens to soil surface (m)
#   camera_tilt_deg  — angle of camera from horizontal (downward = negative)
#
# These feed directly into the Cherubini & Chaumette interaction matrix
# (deltaz and tilt_angle). Getting them wrong will produce a systematic
# angular bias — the robot will still follow rows but not accurately.
#
# Tune detection params by watching /caatinga_vision/row_nav/debug_image
# in Foxglove.

crop_row_node:
  ros__parameters:

    # -------------------------------------------------------------------------
    # Camera hardware — MEASURE THESE ON YOUR ROBOT before field use
    # -------------------------------------------------------------------------
    image_topic: "/devkit/camera/image_raw"  # USB camera published by usb_cam_node_exe
    debug_image_topic: "/caatinga_vision/row_nav/debug_image"  # annotated frame (Foxglove)
    image_width: 640
    image_height: 480

    # Derived from ifarmate.urdf.xacro (camera_joint + Gazebo <sensor> pose),
    # not measured by hand — these are exact given the xacro's own values:
    #   cam_mount_z = (cam_zone_bottom + cam_zone_top) / 2
    #               = (0.86 + 1.25) / 2 = 1.055 m above ground
    #   <pose>0 0 0 0 0.35 0</pose> -> pitch 0.35 rad = 20.0 deg downward
    #     (xacro's own comment: "Pitched down 20°"; node convention is
    #     downward = negative, per the docstring above)
    # Replaces unconfirmed BonnBot placeholders (1.2 m, -80 deg) that were
    # never updated for Sowbot/ifarmate — -80 deg is nearly straight down,
    # wildly different from the camera's actual shallow 20 deg tilt, and
    # was very likely corrupting the visual-servo steering output even
    # while TSM detection itself looked reasonable in debug_image.
    camera_height_m: 1.055     # from ifarmate.urdf.xacro cam_mount_z
    camera_tilt_deg: -20.0     # from ifarmate.urdf.xacro sensor pitch (0.35 rad)

    # -------------------------------------------------------------------------
    # NEW: Steering trim — compensates a CONSTANT lateral/yaw bias
    # -------------------------------------------------------------------------
    # Field/sim evidence (debug_image over multiple frames across a full run):
    # the fitted row line sits a fixed offset to the left of image-centre in
    # every frame, not just occasionally — same magnitude at the start of the
    # run and 90s later. A bias that doesn't change with distance travelled
    # or detection confidence is not a TSM tuning problem (anchor threshold,
    # prior_lambda, angle clamp etc. only affect which/how a row is *found*).
    # It means image-centre does not correspond to the robot's true forward
    # heading — most likely a small camera yaw offset in the mount/xacro, or
    # a sign/scale error in the Cherubini-Chaumette interaction matrix.
    #
    # steering_trim_deg is added to the computed heading error AFTER the TSM
    # fit and BEFORE the interaction-matrix/omega calculation, so it corrects
    # the symptom without touching row-detection logic. Root cause should
    # still be checked separately (camera_joint yaw in ifarmate.urdf.xacro,
    # driven dead-straight down a row with the robot's own steering disabled
    # to see if debug_image still shows the same offset).
    #
    # Sign convention: positive trim steers the corrected heading to the
    # RIGHT (compensates a left-veering bias). Start small (1-2 deg) and
    # increase only if the robot still visibly favours the left row in
    # debug_image once TSM detection itself is reporting a centred anchor.
    # This must be wired into crop_row_node.py's heading-error computation
    # (see comment there) — declaring it here alone does nothing.
    steering_trim_deg: 0.0

    # -------------------------------------------------------------------------
    # Detection tuning — adjust while watching debug_image_topic in Foxglove
    # -------------------------------------------------------------------------
    n_scan_windows: 8          # Vertical scan columns. More = finer but slower.
    window_width: 80           # Column width (px). Should span one full crop row.
    min_contour_area: 40.0     # Min contour area (px²). Increase to filter soil noise.
    plant_close_kernel: 21

    plant_detect_neighborhood_px: 18
    plant_detect_min_dist_px: 6.0

    # -------------------------------------------------------------------------
    # Velocity — start conservative, increase only once row-following is stable
    # -------------------------------------------------------------------------
    linear_vel: 0.15           # Forward speed (m/s). BonnBot used 0.2.
    omega_scaler: 0.1          # Scale on raw controller output. Upstream default.
    max_omega: 0.4             # Hard angular velocity cap (rad/s).

    use_direct_cmd_vel: true   # value ignored; declare only

    heartbeat_timeout_s: 4.0

    detector: "scanwin"        # overridden by launch; do not rely on this value
    tsm_s: 0.32                # anchor ROI height fraction (h = s*H)

    tsm_amin_frac: 0.4         # anchor column search start (fraction of width)
    tsm_amax_frac: 0.6         # anchor column search end (fraction of width)

    tsm_b_frac: 0.0            # line-scan Begin point x (fraction of width)
    tsm_c_frac: 1.0            # line-scan Cease point x (fraction of width)

    tsm_anchor_min_sum: 8.0

    tsm_morph_kernel: 5        # mask opening kernel px (denoise ExG); 0 = off

    tsm_single_row_offset_px: 0

    tsm_n_rows: 1

    tsm_filter_enable: true
    tsm_filter_alpha: 0.4
    tsm_filter_jump_gate_frac: 0.35
    tsm_filter_max_hold: 2

    tsm_anchor_select: "spatial_prior"
    tsm_peak_rel_thresh: 0.6
    tsm_prior_lambda: 0.05
    tsm_prior_init_frac: 0.5   # spatial_prior: first-frame seed — image centre
    tsm_weight_k: 0.5
    tsm_weight_side: "left"

    tsm_max_angle_deg: 30.0

    tsm_fit_mode: "tsm"
    tsm_ransac_iters: 60
    tsm_ransac_corridor_px: 6.0
    tsm_ransac_min_inliers: 30
    tsm_ransac_max_points: 2000

    tsm_swap_hold_s: 9.0
    tsm_swap_threshold_frac: 0.30


limbic_row_follow:
  ros__parameters:
    row_follow_handover_distance: 2.5
    heartbeat_timeout_s: 6.0
    enable_service_timeout_s: 4.0
    monitor_rate_hz: 10.0

    # -------------------------------------------------------------------------
    # Phase 0 (align) — see limbic_row_follow_node.py docstring
    # -------------------------------------------------------------------------
    # Headland nav_to_pose edges only guarantee loose xy/yaw tolerance at a
    # row endpoint — fine for headland travel, not tight enough for TSM to
    # find the row on its first frame (tsm_max_angle_deg above is 30, so
    # 8 deg leaves comfortable margin without a slow in-place spin).
    row_entry_align_tolerance_deg: 8.0
    row_entry_align_timeout_s: 15.0
    row_entry_align_angular_speed: 0.3   # rad/s, in-place rotation speed
